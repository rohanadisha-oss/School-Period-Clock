<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>শিশুদের ম্যাজিক রঙ খেলা (সব কার-যুক্ত বর্ণ)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e0f2fe; /* নরম হালকা নীল ব্যাকগ্রাউন্ড */
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            user-select: none;
        }

        h1 {
            color: #0369a1;
            margin-bottom: 5px;
        }

        .tip {
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: bold;
            color: #334155;
            text-align: center;
        }

        /* Selection Toolbar Container */
        .selector-container {
            background: white;
            padding: 15px;
            border-radius: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            max-width: 850px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 3px solid #7dd3fc;
        }

        .selector-title {
            font-size: 14px;
            font-weight: bold;
            color: #64748b;
            margin-bottom: 2px;
        }

        /* Scrollable Row Design */
        .scroll-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 5px 2px;
            white-space: nowrap;
        }

        /* Custom Scrollbar for modern look */
        .scroll-row::-webkit-scrollbar {
            height: 6px;
        }
        .scroll-row::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .btn {
            font-size: 20px;
            font-weight: bold;
            padding: 8px 16px;
            background-color: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: #f0f9ff;
            transform: translateY(-1px);
        }

        .btn.active {
            background-color: #0284c7;
            color: white;
            border-color: #0369a1;
        }

        /* Canvas Workspace */
        .canvas-container {
            position: relative;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 5px solid #0284c7;
        }

        canvas {
            display: block;
            cursor: pointer;
        }

        /* Controls Toolbar */
        .controls {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-top: 20px;
            background: white;
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: bold;
            color: #374151;
            font-size: 18px;
        }

        input[type="color"] {
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }

        .clear-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .clear-btn:hover {
            background-color: #dc2626;
        }
    </style>
</head>
<body>

    <h1>ম্যাজিক রঙ মেলা! 🎨✨</h1>
    <p class="tip">অক্ষর ও কার চিহ্ন বেছে নিয়ে ভেতরের ফাঁকা জায়গায় ম্যাজিক রঙ করো!</p>

    <div class="selector-container">
        <div>
            <div class="selector-title">১. ব্যঞ্জনবর্ণ বেছে নাও:</div>
            <div class="scroll-row" id="bornomalaBar"></div>
        </div>
        <div>
            <div class="selector-title">২. কার চিহ্ন বেছে নাও:</div>
            <div class="scroll-row" id="karBar"></div>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="paintCanvas" width="550" height="400"></canvas>
    </div>

    <div class="controls">
        <div class="control-group">
            <label for="colorPicker">রঙ পরিবর্তন:</label>
            <input type="color" id="colorPicker" value="#ff4757">
        </div>
        <button class="clear-btn" id="clearBtn">সব মুছে ফেলো</button>
    </div>

    <script>
        // ব্যঞ্জনবর্ণের তালিকা
        const consonants = [
            'ক', 'খ', 'গ', 'ঘ', 'ঙ', 'চ', 'ছ', 'জ', 'ঝ', 'ঞ', 
            'ট', 'ঠ', 'ড', 'ঢ', 'ণ', 'ত', 'থ', 'দ', 'ধ', 'ন', 
            'প', 'ফ', 'ব', 'ভ', 'ম', 'য', 'র', 'ল', 'শ', 'ষ', 
            'স', 'হ', 'ড়', 'ঢ়', 'য়'
        ];

        // কার চিহ্নের তালিকা (ম্যাপিং সহ)
        const karList = [
            { display: 'া (আ-কার)', value: 'া' },
            { display: 'ি (ই-কার)', value: 'ি' },
            { display: 'ী (ঈ-কার)', value: 'ী' },
            { display: 'ু (উ-কার)', value: 'ু' },
            { display: 'ূ (ঊ-কার)', value: 'ূ' },
            { display: 'ৃ (ঋ-কার)', value: 'ৃ' },
            { display: 'ে (এ-কার)', value: 'ে' },
            { display: 'ৈ (ঐ-কার)', value: 'ৈ' },
            { display: 'ো (ও-কার)', value: 'ো' },
            { display: 'ৌ (ঔ-কার)', value: 'ৌ' }
        ];

        let selectedConsonant = consonants[0];
        let selectedKar = karList[0].value;
        
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const colorPicker = document.getElementById('colorPicker');
        const clearBtn = document.getElementById('clearBtn');

        // Generate Consonant Buttons
        const bornomalaBar = document.getElementById('bornomalaBar');
        consonants.forEach((char, index) => {
            const btn = document.createElement('button');
            btn.textContent = char;
            btn.classList.add('btn');
            if (index === 0) btn.classList.add('active');
            
            btn.addEventListener('click', () => {
                bornomalaBar.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedConsonant = char;
                resetCanvas();
            });
            bornomalaBar.appendChild(btn);
        });

        // Generate Kar Buttons
        const karBar = document.getElementById('karBar');
        karList.forEach((kar, index) => {
            const btn = document.createElement('button');
            btn.textContent = kar.display;
            btn.classList.add('btn');
            if (index === 0) btn.classList.add('active');
            
            btn.addEventListener('click', () => {
                karBar.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedKar = kar.value;
                resetCanvas();
            });
            karBar.appendChild(btn);
        });

        // Current combined text function
        function getCombinedText() {
            return selectedConsonant + selectedKar;
        }

        // Draw character border template
        function drawBackgroundLetter() {
            ctx.save();
            ctx.font = "bold 230px 'Segoe UI', Arial, sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            // কালো স্পষ্ট বর্ডার
            ctx.strokeStyle = "#0f172a"; 
            ctx.lineWidth = 7;
            ctx.strokeText(getCombinedText(), canvas.width / 2, canvas.height / 2);
            ctx.restore();
        }

        function resetCanvas() {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawBackgroundLetter();
        }

        function hexToRgb(hex) {
            const bigint = parseInt(hex.slice(1), 16);
            return {
                r: (bigint >> 16) & 255,
                g: (bigint >> 8) & 255,
                b: bigint & 255
            };
        }

        // Flood Fill Auto-Select Area Algorithm
        function floodFill(startX, startY, fillColor) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const width = canvas.width;
            const height = canvas.height;

            const targetIndex = (startY * width + startX) * 4;
            const targetR = data[targetIndex];
            const targetG = data[targetIndex + 1];
            const targetB = data[targetIndex + 2];

            if (targetR === fillColor.r && targetG === fillColor.g && targetB === fillColor.b) return;
            if (targetR < 50 && targetG < 50 && targetB < 50) return;

            const queue = [[startX, startY]];

            while (queue.length > 0) {
                const [x, y] = queue.shift();
                const idx = (y * width + x) * 4;

                if (data[idx] === targetR && data[idx+1] === targetG && data[idx+2] === targetB) {
                    data[idx] = fillColor.r;
                    data[idx+1] = fillColor.g;
                    data[idx+2] = fillColor.b;
                    data[idx+3] = 255;

                    if (x > 0) queue.push([x - 1, y]);
                    if (x < width - 1) queue.push([x + 1, y]);
                    if (y > 0) queue.push([x, y - 1]);
                    if (y < height - 1) queue.push([x, y + 1]);
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function handleFillEvent(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const x = Math.floor(clientX - rect.left);
            const y = Math.floor(clientY - rect.top);

            if (x >= 0 && x < canvas.width && y >= 0 && y < canvas.height) {
                const chosenColor = hexToRgb(colorPicker.value);
                floodFill(x, y, chosenColor);
            }
        }

        // Mouse and Touch Event Listeners
        canvas.addEventListener('mousedown', handleFillEvent);
        canvas.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            handleFillEvent(e); 
        });

        clearBtn.addEventListener('click', resetCanvas);

        window.onload = () => {
            resetCanvas();
        };
    </script>
</body>
</html>
